server:
  servlet:
    session:
      # Session cookie carrying the authenticated DRI analyst (NIMBA-9). httpOnly
      # so it is never readable from JavaScript; SameSite=Strict to blunt CSRF;
      # secure must be true in production (override SESSION_COOKIE_SECURE) so the
      # cookie is only sent over HTTPS.
      cookie:
        name: NIMBASESSION
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: strict
      timeout: ${SESSION_TIMEOUT:PT8H}

# Structured, rotated logging (NIMBA-28). The console stays human-readable for local
# use; the file is ECS JSON (one object per line) carrying the per-request
# correlation id from CorrelationIdFilter, so an on-premise operator can diagnose an
# incident from the log file alone. Rotation caps disk use on the internally managed
# server. Passwords and raw CSV content are never logged.
logging:
  file:
    name: ${LOG_FILE:logs/nimba.log}
  structured:
    format:
      file: ecs
  logback:
    rollingpolicy:
      max-file-size: ${LOG_MAX_FILE_SIZE:10MB}
      max-history: ${LOG_MAX_HISTORY:30}

spring:
  # Import the local .env (same file Docker Compose reads) so `./gradlew bootRun`
  # and the containers share one source of truth — e.g. POSTGRES_PORT. Optional, so
  # CI and other environments without a .env fall back to the ${VAR:default} values.
  config:
    import: optional:file:.env[.properties]
  application:
    name: app
  servlet:
    multipart:
      # An amortization schedule is a few dozen rows; 2 MB is a generous ceiling
      # (NIMBA-19). Oversized uploads are rejected before parsing.
      max-file-size: ${CSV_UPLOAD_MAX_FILE_SIZE:2MB}
      max-request-size: ${CSV_UPLOAD_MAX_FILE_SIZE:2MB}
  # Render framework-raised errors (ResponseStatusException reasons, 404s, method
  # mismatches) as RFC 7807 problem details — the one error shape the frontend's
  # ApiError parser understands (see shared/web/ApiExceptionHandler for the
  # cross-cutting custom mappings).
  mvc:
    problemdetails:
      enabled: true
  modulith:
    runtime:
      verification-enabled: true
  mail:
    # SMTP relay for invitation e-mails (used by the `smtp` transport). Defaults
    # target the local Mailpit container (docker-compose); set the real relay per
    # environment. Sending failures never block account creation (the invitation
    # is still persisted). Hosts that block outbound SMTP (Render) use the Resend
    # HTTPS transport instead — see nimba.mail.transport below.
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}
  jpa:
    open-in-view: false
    hibernate:
      # Schema is owned by Flyway migrations, not Hibernate. Validate the mapped
      # entities against the migrated schema; never auto-generate it.
      ddl-auto: validate
  flyway:
    enabled: true
  datasource:
    # The POSTGRES_* variables are the SAME ones docker-compose.yml uses, so the
    # database the container creates and the database the app connects to cannot
    # drift. Defaults make a fresh clone run with zero configuration; override the
    # variables (host, credentials) for staging and production, which run on the
    # bank's internal infrastructure (on-premise, mono-tenant — see NIMBA-5).
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:nimba}
    username: ${POSTGRES_USER:nimba}
    password: ${POSTGRES_PASSWORD:nimba}
    hikari:
      # 10 connections comfortably covers the expected concurrency of a single
      # internal DRI team. Override per environment with DB_POOL_MAX_SIZE.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}

# Health endpoint exposed for uptime monitoring (NIMBA-29); the datasource
# indicator reflects real database connectivity, not just process liveness.
management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSED_ENDPOINTS:health,info}
  endpoint:
    health:
      probes:
        enabled: true

api:
  # Prefix applied to every REST controller (and the security matchers). The API
  # version lives here only, so a future version is a one-line change.
  base-path: ${API_BASE_PATH:/api/v1}

auth:
  # Login throttling (NIMBA-9B): max failed attempts per email and per source IP
  # within the rolling window before further attempts are rejected.
  login-rate-limit:
    max-attempts: ${AUTH_LOGIN_MAX_ATTEMPTS:5}
    window: ${AUTH_LOGIN_RATE_WINDOW:PT15M}

nimba:
  app:
    # Public base URL of the frontend, used to build the set-password link in
    # invitation e-mails (e.g. {base}/set-password?token=...).
    frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
    # How long an invitation / set-password token stays valid (ISO-8601 duration).
    invitation-ttl: ${INVITATION_TTL:P7D}
  cors:
    # Browser origin(s) allowed to call the API. Locally the frontend is
    # same-origin; in staging/production it is a separate service (e.g. on Render),
    # so its public origin(s) must be listed here. Comma-separated for several.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  mail:
    # Feature switch: when false, invitations are persisted but no e-mail is sent
    # (useful for tests and environments without an SMTP relay).
    enabled: ${MAIL_ENABLED:true}
    # Delivery transport: `smtp` (default) uses the spring.mail relay above
    # (local Mailpit); `resend` uses the Resend HTTPS API for hosts that block
    # outbound SMTP (Render, Fly). When `resend`, set nimba.mail.resend.api-key.
    transport: ${MAIL_TRANSPORT:smtp}
    resend:
      # Resend API key (secret) and base URL. Only read when transport=resend; the
      # organisation's sender e-mail must be on a domain verified in Resend.
      api-key: ${RESEND_API_KEY:}
      base-url: ${RESEND_BASE_URL:https://api.resend.com}
  minio:
    # Object storage for user avatars. Defaults target the docker-compose MinIO;
    # credentials/bucket reuse the same MINIO_* variables as the container.
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ROOT_USER:nimba}
    secret-key: ${MINIO_ROOT_PASSWORD:nimba-secret}
    bucket: ${MINIO_BUCKET:nimba}

storage:
  # Local filesystem root where original uploaded CSV files are retained for audit
  # (NIMBA-20). On-premise single-instance deployment makes local disk sufficient;
  # revisit only if a multi-instance topology appears in a later phase.
  amortization-schedule-dir: ${AMORTIZATION_SCHEDULE_STORAGE_DIR:storage/credit-cases}
